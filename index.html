<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>
    (function() {
      const FECHA_APERTURA = "2026-04-27T12:30:00"; 
      if (new Date().getTime() < new Date(FECHA_APERTURA).getTime()) {
        window.location.href = "preview.html";
      }
    })();
  </script>
  <title>🏪 Tienda Rápida</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://script.google.com">
  <link rel="preconnect" href="https://drive.google.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <!-- Header -->
  <header>
    <div class="header-inner">
      <div class="logo">⚡ Tienda Rápida</div>
      <p class="tagline">El más rápido se lleva el producto</p>
    </div>
  </header>

  <!-- Controles -->
  <div class="toolbar">
    <button class="btn-refresh" onclick="cargarProductos()">🔄 Actualizar</button>
    <div class="stats">
      <span id="stat-disponibles">— disponibles</span>
      <span id="stat-vendidos">— vendidos</span>
    </div>
    <a href="admin.html" class="btn-admin">⚙️ Admin</a>
  </div>

  <!-- Grid de productos -->
  <main id="catalogo">

    <div class="loading">
      <div class="spinner"></div>
      <p>Cargando productos...</p>
    </div>
  </main>

  <!-- Modal de compra -->
  <div id="modal-overlay" class="modal-overlay hidden" onclick="cerrarModal(event)">
    <div class="modal">
      <button class="modal-close" onclick="_cerrarModal()">✕</button>
      <h2>Confirmar Compra</h2>
      <div id="modal-producto-info"></div>

      <div class="form-group">
        <label for="inp-nombre">Nombre Completo</label>
        <input id="inp-nombre" type="text" placeholder="Juan Pérez" autocomplete="name" />
      </div>
      <div class="form-group">
        <label for="inp-cedula">Cédula / ID</label>
        <input id="inp-cedula" type="text" placeholder="123456789" autocomplete="off" />
      </div>
      <div class="form-group">
        <label for="inp-cantidad">Cantidad</label>
        <input id="inp-cantidad" type="number" min="1" value="1" inputmode="numeric" oninput="actualizarTotalModal()" />
      </div>
      <div id="modal-total" class="modal-total">Total: —</div>

      <button id="btn-confirmar" class="btn-comprar-modal" onclick="confirmarCompra()">
        ✅ Confirmar Compra
      </button>
      <div id="modal-mensaje"></div>
    </div>
  </div>

  <!-- Lightbox de Imágenes -->
  <div id="lightbox-overlay" class="lightbox-overlay hidden" onclick="cerrarLightbox(event)">
    <div class="lightbox-content">
      <button class="lightbox-close" onclick="_cerrarLightbox()">✕</button>
      <img id="lightbox-img" src="" alt="Vista previa" />
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
