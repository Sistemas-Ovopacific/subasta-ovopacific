<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>⚙️ Admin — Tienda Rápida</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/admin.css"/>
</head>

<body>
  <div class="admin-wrap">
    <div class="admin-header">
      <h1>⚙️ Panel de Administración</h1>
      <p>Gestión de productos — <a href="index.html" style="color:var(--accent)">Ver catálogo →</a></p>
    </div>

    <div id="screen-login">
      <div class="login-box">
        <h2>🔐 Acceso Admin</h2>
        <div class="form-group" style="margin-bottom:14px">
          <label for="inp-clave">Contraseña</label>
          <input id="inp-clave" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()" />
        </div>
        <button class="btn-primary" onclick="login()">Entrar</button>
        <div id="msg-login" class="msg" style="margin-top:12px"></div>
      </div>
    </div>

    <div id="screen-admin">
      <div class="panel">
        <h2>➕ Agregar Producto <button class="btn-logout" onclick="logout()">Salir</button></h2>
        <div class="grid-2">
          <div class="form-group">
            <label>ID del Producto *</label>
            <input id="f-id" type="text" placeholder="001" />
          </div>
          <div class="form-group">
            <label>Precio (COP) *</label>
            <input id="f-precio" type="number" min="0" placeholder="150000" />
          </div>
          <div class="form-group">
            <label>Cantidad *</label>
            <input id="f-cantidad" type="number" min="1" value="1" />
          </div>
          <div class="form-group full">
            <label>Nombre del Producto *</label>
            <input id="f-nombre" type="text" placeholder="Tablet Samsung A7" />
          </div>
          <div class="form-group full">
            <label>Descripción</label>
            <input id="f-desc" type="text" placeholder="Pantalla 10.4&quot;, 64GB, WiFi" />
          </div>
          <div class="form-group full">
            <label>Imagen del Producto</label>
            <div class="upload-area" id="upload-area" onclick="document.getElementById('f-img-file').click()"
              ondragover="dragOver(event)" ondragleave="dragLeave(event)" ondrop="dropFile(event)">
              <input id="f-img-file" type="file" accept="image/*" style="display:none"
                onchange="seleccionarImagen(this)" />
              <div id="upload-placeholder">
                <span style="font-size:2rem">📁</span>
                <p>Haz clic o arrastra una imagen aquí</p>
                <small style="color:var(--text-muted)">JPG, PNG, WEBP — máx. 5 MB</small>
              </div>
              <img id="img-preview" class="img-preview" alt="Vista previa" />
            </div>
            <div id="upload-progress-wrap" style="display:none; margin-top:8px;">
              <div style="height:6px; background:var(--border); border-radius:99px; overflow:hidden;">
                <div id="upload-bar"
                  style="height:100%; width:0%; background:var(--green); border-radius:99px; transition:width 0.3s;">
                </div>
              </div>
              <small id="upload-status"
                style="color:var(--text-muted); font-size:0.8rem; display:block; margin-top:4px;">Subiendo
                imagen...</small>
            </div>
            <input id="f-img-url" type="hidden" />
          </div>
        </div>
        <button id="btn-agregar" class="btn-primary" onclick="agregarProducto()">✅ Publicar Producto</button>
        <div id="msg-agregar" class="msg"></div>
      </div>

      <div class="panel">
        <h2>📦 Productos en el Catálogo</h2>
        <div id="tabla-wrap">
          <p style="color:var(--text-muted);text-align:center">Cargando...</p>
        </div>
      </div>

      <div class="panel">
        <h2>💰 Historial de Ventas</h2>
        <div id="ventas-wrap">
          <p style="color:var(--text-muted);text-align:center">Cargando ventas...</p>
        </div>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script>
    const CONFIG = window.GARAJE_CONFIG || {};
    const API_URL = CONFIG.API_URL || "";
    const REQUEST_TIMEOUT_MS = CONFIG.REQUEST_TIMEOUT_MS || 15000;

    let claveAdmin = "";
    let imagenUrlSubida = "";
    let productosMapAdmin = {};

    async function login() {
      const clave = document.getElementById("inp-clave").value;
      if (!clave) {
        setMsg("msg-login", "Ingresa la contraseña.", "err");
        return;
      }

      const btn = document.querySelector("#screen-login button");
      btn.disabled = true;
      setMsg("msg-login", "Verificando credenciales...", "");

      try {
        const data = await apiPost({ accion: "verificarClave", clave });

        if (data.ok) {
          claveAdmin = clave;
          document.getElementById("screen-login").style.display = "none";
          document.getElementById("screen-admin").style.display = "block";
          await Promise.all([cargarProductos(), cargarVentas()]);
        } else {
          setMsg("msg-login", data.mensaje || "Contraseña incorrecta.", "err");
        }
      } catch (err) {
        setMsg("msg-login", "Error al conectar: " + err.message, "err");
      } finally {
        btn.disabled = false;
      }
    }

    function logout() {
      claveAdmin = "";
      imagenUrlSubida = "";
      productosMapAdmin = {};
      document.getElementById("screen-login").style.display = "flex";
      document.getElementById("screen-admin").style.display = "none";
      document.getElementById("inp-clave").value = "";
      limpiarFormularioProducto();
    }

    function dragOver(e) {
      e.preventDefault();
      document.getElementById("upload-area").classList.add("dragover");
    }

    function dragLeave(e) {
      e.preventDefault();
      document.getElementById("upload-area").classList.remove("dragover");
    }

    function dropFile(e) {
      e.preventDefault();
      document.getElementById("upload-area").classList.remove("dragover");
      const file = e.dataTransfer.files[0];
      if (file) procesarArchivo(file);
    }

    function seleccionarImagen(input) {
      if (input.files && input.files[0]) procesarArchivo(input.files[0]);
    }

    function procesarArchivo(file) {
      if (!claveAdmin) {
        alert("Primero inicia sesión.");
        return;
      }
      if (!file.type.startsWith("image/")) {
        alert("Por favor selecciona un archivo de imagen.");
        return;
      }
      if (file.size > 5 * 1024 * 1024) {
        alert("La imagen supera los 5 MB.");
        return;
      }

      const reader = new FileReader();
      reader.onload = function (e) {
        const preview = document.getElementById("img-preview");
        preview.src = e.target.result;
        preview.classList.add("visible");
        document.getElementById("upload-area").classList.add("has-image");
        subirADrive(file, e.target.result);
      };
      reader.readAsDataURL(file);
    }

    async function subirADrive(file, dataUrl) {
      const progressWrap = document.getElementById("upload-progress-wrap");
      const bar = document.getElementById("upload-bar");
      const status = document.getElementById("upload-status");
      const btnAgregar = document.getElementById("btn-agregar");

      progressWrap.style.display = "block";
      bar.style.background = "var(--green)";
      bar.style.width = "20%";
      status.textContent = "Subiendo imagen a Google Drive...";
      status.style.color = "var(--text-muted)";
      btnAgregar.disabled = true;
      imagenUrlSubida = "";
      document.getElementById("f-img-url").value = "";

      try {
        const base64 = dataUrl.split(",")[1];
        bar.style.width = "50%";

        const data = await apiPost({
          accion: "subirImagen",
          clave: claveAdmin,
          base64,
          mimeType: file.type,
          nombreArchivo: file.name
        });

        bar.style.width = "100%";
        if (data.ok) {
          imagenUrlSubida = data.url || "";
          document.getElementById("f-img-url").value = imagenUrlSubida;
          status.textContent = "Imagen subida correctamente";
          status.style.color = "var(--green)";
        } else {
          bar.style.background = "var(--red)";
          status.textContent = data.mensaje || "No fue posible subir la imagen.";
          status.style.color = "var(--red)";
        }
      } catch (err) {
        bar.style.background = "var(--red)";
        status.textContent = "Error de conexión: " + err.message;
        status.style.color = "var(--red)";
      } finally {
        btnAgregar.disabled = false;
      }
    }

    async function agregarProducto() {
      const btn = document.getElementById("btn-agregar");
      const id = document.getElementById("f-id").value.trim();
      const nombre = document.getElementById("f-nombre").value.trim();
      const precio = Number(document.getElementById("f-precio").value);
      const cantidad = Number(document.getElementById("f-cantidad").value);

      if (!id || !nombre || !Number.isFinite(precio) || !Number.isInteger(cantidad) || cantidad < 1) {
        setMsg("msg-agregar", "ID, nombre, precio y cantidad válida son obligatorios.", "err");
        return;
      }

      btn.disabled = true;
      setMsg("msg-agregar", "Publicando producto...", "");

      try {
        const data = await apiPost({
          accion: "agregarProducto",
          clave: claveAdmin,
          id,
          nombre,
          descripcion: document.getElementById("f-desc").value.trim(),
          precio,
          cantidad,
          imagenUrl: imagenUrlSubida
        });

        setMsg("msg-agregar", data.mensaje || (data.ok ? "Producto publicado." : "No fue posible publicar."), data.ok ? "ok" : "err");

        if (data.ok) {
          limpiarFormularioProducto();
          await cargarProductos();
        } else if ((data.mensaje || "").toLowerCase().includes("clave")) {
          setTimeout(logout, 1500);
        }
      } catch (err) {
        setMsg("msg-agregar", "Error de conexión: " + err.message, "err");
      } finally {
        btn.disabled = false;
      }
    }

    async function resetear(rowIndex) {
      const producto = productosMapAdmin[rowIndex];
      if (!producto) return;

      if (!confirm(`¿Volver a poner "${producto.nombre}" como Disponible?`)) return;

      try {
        const data = await apiPost({
          accion: "resetear",
          clave: claveAdmin,
          id: producto.id,
          rowIndex
        });
        alert(data.mensaje || (data.ok ? "Producto reseteado." : "No fue posible resetear."));
        if (data.ok) await cargarProductos();
        if (!data.ok && (data.mensaje || "").toLowerCase().includes("clave")) logout();
      } catch (err) {
        alert("Error de conexión: " + err.message);
      }
    }

    async function cargarProductos() {
      const wrap = document.getElementById("tabla-wrap");
      wrap.innerHTML = `<p style="color:var(--text-muted);text-align:center">Cargando...</p>`;

      try {
        const data = await cargarProductosAdmin();
        if (!data.ok) throw new Error(data.mensaje || data.error || "Error desconocido");

        productosMapAdmin = {};
        const productos = (data.productos || []).map(normalizarProductoAdmin);
        productos.forEach(p => { productosMapAdmin[p.rowIndex] = p; });

        renderTabla(productos);
      } catch (e) {
        wrap.innerHTML = `<p style="color:var(--red)"></p>`;
        wrap.querySelector("p").textContent = "Error: " + e.message;
      }
    }

    async function cargarVentas() {
      const wrap = document.getElementById("ventas-wrap");
      try {
        const data = await apiPost({ accion: "listarVentas", clave: claveAdmin });
        if (!data.ok) throw new Error(data.mensaje || "Error al cargar ventas");
        renderVentas(data.ventas || []);
      } catch (e) {
        wrap.innerHTML = `<p style="color:var(--red)">Error: ${e.message}</p>`;
      }
    }

    function renderVentas(ventas) {
      const wrap = document.getElementById("ventas-wrap");
      if (!ventas.length) {
        wrap.innerHTML = `<p style="color:var(--text-muted);text-align:center">Aún no hay ventas registradas.</p>`;
        return;
      }

      wrap.innerHTML = `
      <table class="product-table">
        <thead><tr>
          <th>Fecha</th><th>Producto</th><th>Cant.</th><th>Total</th><th>Comprador</th>
        </tr></thead>
        <tbody>
          ${ventas.map(v => `
            <tr>
              <td><small>${escHtml(v.fecha)}</small></td>
              <td><strong>${escHtml(v.producto)}</strong><br><small style="color:var(--text-muted)">ID: ${escHtml(v.idProducto)}</small></td>
              <td>${v.cantidad}</td>
              <td>${formatCOP(v.total)}</td>
              <td><strong>${escHtml(v.comprador)}</strong><br><small style="color:var(--text-muted)">${escHtml(v.cedula)}</small></td>
            </tr>
          `).join("")}
        </tbody>
      </table>`;
    }

    async function cargarProductosAdmin() {
      const data = await apiPost({ accion: "listarAdmin", clave: claveAdmin });
      // Eliminamos el fallback a apiGet() para que si falla el admin, sepamos por qué (ej. clave incorrecta)
      // y no nos muestre datos públicos por error.
      return data;
    }

    function renderTabla(productos) {
      const wrap = document.getElementById("tabla-wrap");
      if (!productos.length) {
        wrap.innerHTML = `<p style="color:var(--text-muted);text-align:center">No hay productos aún.</p>`;
        return;
      }

      wrap.innerHTML = `
      <table class="product-table">
        <thead><tr>
          <th>Img</th><th>Nombre</th><th>Precio</th><th>Stock</th><th>Estado</th><th>Acciones</th>
        </tr></thead>
        <tbody>
          ${productos.map(p => {
            const vendido = p.estado === "Vendido";
            const rowIndex = Number.isFinite(p.rowIndex) ? p.rowIndex : 0;
            // Mostramos el comprador si existe el dato, aunque no esté totalmente vendido
            const comprador = p.comprador
              ? `<br><small style="color:var(--text-muted)">🙋‍♂️ ${escHtml(p.comprador)} (${escHtml(p.cedula)})<br>🕒 ${escHtml(p.fecha)}</small>`
              : "";

            return `
            <tr>
              <td>${p.imagenUrl ? `<img src="${escAttr(p.imagenUrl)}" alt="">` : `<div class="no-img">🛍️</div>`}</td>
              <td><strong>${escHtml(p.nombre)}</strong><br><small style="color:var(--text-muted)">${escHtml(p.descripcion)}</small></td>
              <td>${formatCOP(p.precio)}</td>
              <td><strong>${p.cantidadDisponible}</strong><br><small style="color:var(--text-muted)">de ${p.cantidadInicial}</small></td>
              <td>
                <span class="status-dot ${vendido ? "dot-sold" : "dot-ok"}"></span>${escHtml(p.estado)}
                ${comprador}
              </td>
              <td>${vendido ? `<button class="btn-sm btn-reset" onclick="resetear(${rowIndex})">🔄 Resetear</button>` : "—"}</td>
            </tr>`;
          }).join("")}
        </tbody>
      </table>`;
    }

    function limpiarFormularioProducto() {
      ["f-id", "f-nombre", "f-desc", "f-precio"].forEach(id => document.getElementById(id).value = "");
      document.getElementById("f-cantidad").value = "1";
      imagenUrlSubida = "";
      document.getElementById("f-img-url").value = "";
      document.getElementById("img-preview").classList.remove("visible");
      document.getElementById("img-preview").src = "";
      document.getElementById("upload-area").classList.remove("has-image");
      document.getElementById("upload-progress-wrap").style.display = "none";
      document.getElementById("f-img-file").value = "";
    }

    async function apiGet() {
      const separator = API_URL.includes("?") ? "&" : "?";
      return requestJson(`${API_URL}${separator}_=${Date.now()}`, {
        method: "GET",
        cache: "no-store"
      });
    }

    async function apiPost(payload) {
      if (!API_URL) throw new Error("Falta configurar la URL del API.");
      return requestJson(API_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(payload),
        cache: "no-store"
      });
    }

    async function requestJson(url, options) {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), REQUEST_TIMEOUT_MS);

      try {
        const res = await fetch(url, { ...options, signal: controller.signal });
        if (!res.ok) throw new Error("HTTP " + res.status);
        return await res.json();
      } catch (err) {
        if (err.name === "AbortError") throw new Error("Tiempo de espera agotado");
        throw err;
      } finally {
        clearTimeout(timeout);
      }
    }

    function normalizarProductoAdmin(p) {
      return {
        id: String(p.id || "").trim(),
        imagenUrl: String(p.imagenUrl || "").trim(),
        nombre: String(p.nombre || "Sin nombre").trim(),
        descripcion: String(p.descripcion || "").trim(),
        precio: p.precio,
        estado: String(p.estado || "Disponible").trim(),
        cantidadDisponible: normalizarCantidad(p.cantidadDisponible, p.estado),
        cantidadInicial: normalizarCantidadInicial(p.cantidadInicial, p.cantidadDisponible, p.estado),
        comprador: String(p.comprador || "").trim(),
        cedula: String(p.cedula || "").trim(),
        fecha: String(p.fecha || "").trim(),
        rowIndex: Number(p.rowIndex)
      };
    }

    function normalizarCantidad(cantidad, estado) {
      const value = Number(cantidad);
      if (Number.isFinite(value)) return Math.max(0, Math.floor(value));
      return String(estado || "") === "Vendido" ? 0 : 1;
    }

    function normalizarCantidadInicial(cantidadInicial, cantidadDisponible, estado) {
      const value = Number(cantidadInicial);
      if (Number.isFinite(value) && value > 0) return Math.floor(value);
      return Math.max(1, normalizarCantidad(cantidadDisponible, estado));
    }

    function escHtml(str) {
      if (str === null || str === undefined) return "";
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function escAttr(str) {
      return escHtml(str).replace(/`/g, "&#96;");
    }

    function formatCOP(v) {
      if (v === null || v === undefined || v === "") return "—";
      return new Intl.NumberFormat("es-CO", { style: "currency", currency: "COP", maximumFractionDigits: 0 }).format(v);
    }

    function setMsg(id, text, type) {
      const el = document.getElementById(id);
      el.textContent = text;
      el.className = "msg " + (type || "");
    }
  </script>
</body>

</html>
